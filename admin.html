<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Nail Salon CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f6f8; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #d68f6c; margin-top: 0; }
        .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; font-weight: 500; color: #666; transition: 0.3s; }
        .tab:hover { color: #d68f6c; }
        .tab.active { color: #d68f6c; border-bottom: 2px solid #d68f6c; margin-bottom: -2px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #f9f9f9; color: #555; }
        button { background: #d68f6c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b0704f; }
        button.btn-danger { background: #e57373; }
        button.btn-danger:hover { background: #c62828; }
        .form-group { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        input, select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .bg-pending { background: #ffe0b2; color: #e65100; }
        .bg-success { background: #c8e6c9; color: #1b5e20; }
    </style>
</head>
<body>

<div class="container">
    <h1>Hệ Thống Quản Trị Cửa Hàng</h1>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('products')"><i class="ph ph-bag"></i> Sản Phẩm</div>
        <div class="tab" onclick="switchTab('customers')"><i class="ph ph-users"></i> Khách Hàng</div>
        <div class="tab" onclick="switchTab('orders')"><i class="ph ph-receipt"></i> Đơn Hàng</div>
    </div>

    <!-- PRODUCTS TAB -->
    <div id="products" class="tab-content active">
        <div class="form-group">
            <input type="text" id="p-name" placeholder="Tên sản phẩm/Dịch vụ" required>
            <input type="number" id="p-price" placeholder="Giá ($)">
            <input type="number" id="p-stock" placeholder="Số lượng tồn">
            <input type="text" id="p-desc" placeholder="Mô tả ngắn">
            <button onclick="addProduct()"><i class="ph ph-plus"></i> Thêm</button>
        </div>
        <table>
            <thead><tr><th>ID</th><th>Tên</th><th>Khối lượng/Kho</th><th>Giá</th><th>Thao tác</th></tr></thead>
            <tbody id="products-table"></tbody>
        </table>
    </div>

    <!-- CUSTOMERS TAB -->
    <div id="customers" class="tab-content">
        <div class="form-group">
            <input type="text" id="c-name" placeholder="Tên khách hàng" required>
            <input type="text" id="c-phone" placeholder="Số điện thoại" required>
            <button onclick="addCustomer()"><i class="ph ph-plus"></i> Thêm</button>
        </div>
        <table>
            <thead><tr><th>ID</th><th>Tên</th><th>SĐT</th><th>Thao tác</th></tr></thead>
            <tbody id="customers-table"></tbody>
        </table>
    </div>

    <!-- ORDERS TAB -->
    <div id="orders" class="tab-content">
        <div class="form-group">
            Khách hàng: <select id="o-customer"></select>
            Khóa học/Sản phẩm: <select id="o-product"></select>
            <input type="number" id="o-amount" placeholder="Giá ($)" required>
            <button onclick="addOrder()"><i class="ph ph-plus"></i> Tạo đơn</button>
        </div>
        <table>
            <thead><tr><th>ID</th><th>Khách Hàng</th><th>Sản Phẩm</th><th>Số Tiền</th><th>Trạng Thái</th><th>Thao Tác</th></tr></thead>
            <tbody id="orders-table"></tbody>
        </table>
    </div>
</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        loadData();
    }

    async function loadData() {
        // Load Products
        let res = await fetch('/api/products');
        let prods = await res.json();
        let html = '';
        let optHtml = '';
        prods.forEach(p => {
            html += `<tr><td>${p.id}</td><td>${p.name}</td><td>${p.stock}</td><td>$${p.price}</td>
                     <td><button class="btn-danger" onclick="del('/api/products/${p.id}')">Xóa</button></td></tr>`;
            optHtml += `<option value="${p.id}">${p.name} (Tồn: ${p.stock})</option>`;
        });
        document.getElementById('products-table').innerHTML = html;
        document.getElementById('o-product').innerHTML = optHtml;

        // Load Customers
        res = await fetch('/api/customers');
        let custs = await res.json();
        html = '';
        optHtml = '';
        custs.forEach(c => {
            html += `<tr><td>${c.id}</td><td>${c.name}</td><td>${c.phone}</td>
                     <td><button class="btn-danger" onclick="del('/api/customers/${c.id}')">Xóa</button></td></tr>`;
            optHtml += `<option value="${c.id}">${c.name} - ${c.phone}</option>`;
        });
        document.getElementById('customers-table').innerHTML = html;
        document.getElementById('o-customer').innerHTML = optHtml;

        // Load Orders
        res = await fetch('/api/orders');
        let ords = await res.json();
        html = '';
        ords.forEach(o => {
            let statusBadge = o.status === 'success' 
                              ? `<span class="badge bg-success">Thành công</span>` 
                              : `<span class="badge bg-pending" onclick="markSuccess(${o.id})" style="cursor:pointer" title="Bấm để xác nhận đã nhận tiền">Đang chờ (Click xác nhận)</span>`;
            
            html += `<tr><td>#${o.id}</td><td>${o.customer_name}</td><td>${o.product_name}</td><td>$${o.amount}</td>
                     <td>${statusBadge}</td>
                     <td><button class="btn-danger" onclick="del('/api/orders/${o.id}')">Xóa</button></td></tr>`;
        });
        document.getElementById('orders-table').innerHTML = html;
    }

    async function addProduct() {
        let name = document.getElementById('p-name').value;
        if(!name) return alert("Nhập tên!");
        await fetch('/api/products', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                name: name,
                price: document.getElementById('p-price').value,
                stock: document.getElementById('p-stock').value,
                description: document.getElementById('p-desc').value
            })
        });
        loadData();
    }

    async function addCustomer() {
        let name = document.getElementById('c-name').value;
        if(!name) return alert("Nhập tên!");
        await fetch('/api/customers', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ name: name, phone: document.getElementById('c-phone').value, zalo: '' })
        });
        loadData();
    }

    async function addOrder() {
        await fetch('/api/orders', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ 
                customer_id: document.getElementById('o-customer').value,
                product_id: document.getElementById('o-product').value,
                amount: document.getElementById('o-amount').value
            })
        });
        alert('Tạo đơn thành công! (Kho hàng đã bị trừ 1)');
        loadData();
    }

    async function markSuccess(id) {
        if(confirm("Bạn có chắc chắn khách hàng đã chuyển khoản thành công? Cập nhật đơn này sang Success?")) {
            await fetch(`/api/orders/${id}`, {
                method:'PUT', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ status: 'success' })
            });
            loadData();
        }
    }

    async function del(url) {
        if(confirm('Chắc chắn xóa?')) {
            await fetch(url, {method:'DELETE'});
            loadData();
        }
    }

    window.onload = loadData;
</script>

</body>
</html>
